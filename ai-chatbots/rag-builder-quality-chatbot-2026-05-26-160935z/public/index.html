<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG Builder Quality Check</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-variant="mission-console" data-feature="brief-builder">
  <main class="app-shell consoleBody">
    <section class="hero">
      <img src="https://source.unsplash.com/1400x1000/?library%2Cdata%2Cresearch" alt="RAG visual" onerror="this.onerror=null;this.src='cover.svg';">
      <div class="hero-copy"><p>RAG</p><h1>RAG Builder Quality Check</h1><span>Mission Console</span></div>
    </section>
    <section class="chat">
      <header><div><p>Brief Builder</p><h2>RAG Builder Quality Check</h2></div><span id="status">demo ready</span></header>
      <aside class="tool-panel"><strong>Starter actions</strong><div class="chips"><button type="button" class="chip">Summarize</button><button type="button" class="chip">Risks</button><button type="button" class="chip">Next steps</button></div><small id="quality">Premium variant: mission-console</small></aside>
      <form id="keyForm" class="key-form"><input id="apiKey" type="password" placeholder="Optional OpenAI API key"><button>Use Key</button></form>
      <div id="messages"></div>
      <form id="chatForm" class="chat-form"><input id="text" placeholder="Ask for a sharp answer..."><button>Send</button></form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
