<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Healthcare Planner Daily Brief</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-variant="split-command" data-feature="ops-check">
  <main class="app-shell splitBody">
    <section class="hero">
      <img src="https://source.unsplash.com/1400x1000/?healthcare%2Cclinic%2Ctechnology" alt="Healthcare visual" onerror="this.onerror=null;this.src='cover.svg';">
      <div class="hero-copy"><p>Healthcare</p><h1>Healthcare Planner Daily Brief</h1><span>Split Command Center</span></div>
    </section>
    <section class="chat">
      <header><div><p>Ops Check</p><h2>Healthcare Planner Daily Brief</h2></div><span id="status">demo ready</span></header>
      <aside class="tool-panel"><strong>Starter actions</strong><div class="chips"><button type="button" class="chip">Checklist</button><button type="button" class="chip">Blockers</button><button type="button" class="chip">Automate</button></div><small id="quality">Premium variant: split-command</small></aside>
      <form id="keyForm" class="key-form"><input id="apiKey" type="password" placeholder="Optional OpenAI API key"><button>Use Key</button></form>
      <div id="messages"></div>
      <form id="chatForm" class="chat-form"><input id="text" placeholder="Ask for a sharp answer..."><button>Send</button></form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
