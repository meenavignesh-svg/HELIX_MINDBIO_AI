<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Agents Builder Idea Sprint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <img src="https://source.unsplash.com/1400x1000/?microphone%2Cstudio%2Cvoice" alt="Voice Agents visual" onerror="this.onerror=null;this.src='cover.svg';">
      <div class="hero-copy"><p>Voice Agents</p><h1>Voice Agents Builder Idea Sprint</h1><span>Premium browser demo</span></div>
    </section>
    <section class="chat">
      <header><div><p>Voice Agents</p><h2>Voice Agents Builder Idea Sprint</h2></div><span id="status">demo ready</span></header>
      <form id="keyForm" class="key-form"><input id="apiKey" type="password" placeholder="Optional OpenAI API key"><button>Use Key</button></form>
      <div id="messages"></div>
      <form id="chatForm" class="chat-form"><input id="text" placeholder="Ask this chatbot for a sharp answer..."><button>Send</button></form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
