name: Generate chatbot project

on:
  push:
    paths:
      - '.github/workflows/generate-chatbot.yml'
      - 'tools/chatbot_factory/**'
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: Optional theme slug, for example robot-gardener or biotech-notes
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: chatbot-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate chatbot
        env:
          CHATBOT_THEME: ${{ inputs.theme }}
        run: |
          python tools/chatbot_factory/generate.py | tee generated-chatbot.txt
          echo "CHATBOT_PATH=$(sed -n 's/^Created //p; s/^Generated //p' generated-chatbot.txt | tail -n 1)" >> "$GITHUB_ENV"

      - name: Update repository indexes
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          chatbot_path = os.environ.get('CHATBOT_PATH', '').strip()
          if not chatbot_path:
              print('No chatbot path found; skipping index updates.')
              raise SystemExit(0)

          folder_name = Path(chatbot_path).name
          match = re.match(r'(.+)-chatbot-(\d{4}-\d{2}-\d{2})-(\d{4})z(?:-\d+)?$', folder_name)
          slug = match.group(1) if match else folder_name.replace('-chatbot', '')
          title = ' '.join(part.capitalize() for part in slug.split('-'))
          made_on = f"{match.group(2)} {match.group(3)[:2]}:{match.group(3)[2:]} UTC" if match else 'Generated by automation pipeline'

          categories = {
              'robot-gardener': ('Automation', 'automation/README.md'),
              'startup-coach': ('Productivity', 'productivity/README.md'),
              'biotech-notes': ('Biotech', 'biotech/README.md'),
              'game-master': ('Education', 'education/README.md'),
          }
          category, area_readme = categories.get(slug, ('Automation', 'automation/README.md'))
          row_status = 'Successful demo'
          model = 'Browser demo + Vercel/OpenAI-ready'
          quality = 'Basic smoke check'
          deployment = 'Not deployed'

          def read(path):
              file_path = Path(path)
              return file_path.read_text(encoding='utf-8') if file_path.exists() else ''

          def write(path, text):
              file_path = Path(path)
              file_path.parent.mkdir(parents=True, exist_ok=True)
              file_path.write_text(text.rstrip() + '\n', encoding='utf-8')

          def next_number(text):
              nums = [int(n) for n in re.findall(r'^\|\s*(\d+)\s*\|', text, flags=re.MULTILINE)]
              return max(nums, default=0) + 1

          def append_catalog_row(path):
              text = read(path)
              if chatbot_path in text:
                  return
              number = next_number(text)
              row = f"| {number} | {title} | {made_on} | {category} | `{chatbot_path}` | {row_status} | {model} | {quality} | {deployment} |"
              lines = text.splitlines()
              last_row = -1
              for index, line in enumerate(lines):
                  if re.match(r'^\|\s*\d+\s*\|', line):
                      last_row = index
              if last_row >= 0:
                  lines.insert(last_row + 1, row)
                  write(path, '\n'.join(lines))
                  return
              if text.strip():
                  text += '\n\n'
              text += '## Chatbot Catalog\n\n| S.No | Chatbot | Made On (UTC) | Category | Folder | Status | Model | Quality | Deployment |\n| ---: | --- | --- | --- | --- | --- | --- | --- | --- |\n' + row + '\n'
              write(path, text)

          def append_line(path, heading, line):
              text = read(path)
              if chatbot_path in text:
                  return
              if not text.strip():
                  text = f"# {heading}\n"
              if heading not in text:
                  text = text.rstrip() + f"\n\n## {heading}\n"
              text = text.rstrip() + f"\n- {line}\n"
              write(path, text)

          append_catalog_row('README.md')
          append_catalog_row('CHATBOT_CATALOG.md')
          append_line(area_readme, 'Generated Projects', f"{made_on}: {title} - `{chatbot_path}` - generated by automation pipeline.")
          append_line('tracking/successful-projects.md', 'Successful Projects', f"{made_on}: {title} - `{chatbot_path}` - browser demo created and smoke-checked.")
          append_line('tracking/model-usage.md', 'Model Usage', f"{made_on}: {title} - `{chatbot_path}` - {model}.")
          append_line('tracking/response-quality.md', 'Response Quality', f"{made_on}: {title} - `{chatbot_path}` - demo replies available; real AI mode deployment-ready.")
          append_line('tracking/benchmarks.md', 'Benchmarks', f"{made_on}: {title} - `{chatbot_path}` - static browser demo smoke check passed.")
          append_line('tracking/deployment-links.md', 'Deployment Links', f"{made_on}: {title} - `{chatbot_path}` - Vercel link pending.")
          append_line('screenshots/README.md', 'Screenshot Notes', f"{made_on}: {title} - `{chatbot_path}` - screenshot pending.")
          print(f'Updated indexes for {chatbot_path}')
          PY

      - name: Commit generated project
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add generated chatbot project
          file_pattern: ai-chatbots/** README.md CHATBOT_CATALOG.md healthcare/** biotech/** education/** automation/** productivity/** medical-coding/** local-llm/** rag/** voice-agents/** tracking/** screenshots/** tags/**

      - name: Email chatbot notification
        if: steps.auto_commit.outputs.changes_detected == 'true'
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          CHATBOT_PATH: ${{ env.CHATBOT_PATH }}
          COMMIT_HASH: ${{ steps.auto_commit.outputs.commit_hash }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          username = os.environ.get('MAIL_USERNAME', '').strip()
          password = os.environ.get('MAIL_PASSWORD', '').strip()
          if not username or not password:
              print('Mail secrets are missing; skipping email notification.')
              raise SystemExit(0)

          server = os.environ.get('MAIL_SERVER', '').strip() or 'smtp.gmail.com'
          port = int(os.environ.get('MAIL_PORT', '').strip() or '465')
          sender = os.environ.get('MAIL_FROM', '').strip() or username
          chatbot_path = os.environ.get('CHATBOT_PATH', '').strip() or 'ai-chatbots/'
          commit_hash = os.environ.get('COMMIT_HASH', '').strip()
          commit_url = f'https://github.com/meenavignesh-svg/ai-chat-bots-per-minute/commit/{commit_hash}' if commit_hash else 'https://github.com/meenavignesh-svg/ai-chat-bots-per-minute'

          msg = EmailMessage()
          msg['Subject'] = 'New AI chatbot created'
          msg['From'] = sender
          msg['To'] = 'torrickytan@gmail.com'
          msg.set_content(
              'A new chatbot project was created.\n\n'
              f'Project path: {chatbot_path}\n'
              'Repository: https://github.com/meenavignesh-svg/ai-chat-bots-per-minute\n'
              f'Commit: {commit_url}\n'
          )

          with smtplib.SMTP_SSL(server, port) as smtp:
              smtp.login(username, password)
              smtp.send_message(msg)
          print('Email notification sent.')
          PY
