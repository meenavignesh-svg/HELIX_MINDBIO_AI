name: Build JANET Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "requirements_helixmind_bio_ai.txt"
      - "helixmind_bio_ai.spec"
      - "assets/**"
      - "tools/**"
      - "installer/**"
      - ".github/workflows/build-helixmind-bio-ai-installer.yml"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_helixmind_bio_ai.txt
          pip install pyinstaller

      - name: Generate JANET icon
        run: python tools/generate_janet_icon.py

      - name: Build app
        run: pyinstaller helixmind_bio_ai.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $compiler)) { throw "Inno Setup compiler not found at $compiler" }
          & $compiler installer\HelixMindBioAI.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: JANETSetup
          path: installer-output\JANETSetup.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: janet-latest
          name: JANET Latest
          body: Download JANETSetup.exe and run it to install the light-themed bioinformatics desktop assistant.
          files: installer-output\JANETSetup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
