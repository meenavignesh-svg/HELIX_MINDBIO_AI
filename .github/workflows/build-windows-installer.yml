name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "requirements.txt"
      - "professor.spec"
      - "installer/**"
      - ".github/workflows/build-windows-installer.yml"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Professor app
        run: pyinstaller professor.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build setup installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $compiler)) { throw "Inno Setup compiler not found at $compiler" }
          & $compiler installer\Professor.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfessorSetup
          path: installer-output\ProfessorSetup.exe

      - name: Publish latest installer release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: professor-latest
          name: Professor Voice Assistant Latest
          body: Download ProfessorSetup.exe and run it to install Professor like a normal Windows app.
          files: installer-output\ProfessorSetup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
